services:
  db:
    image: mysql:8.0
    container_name: uttecam-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: uttecam
      MYSQL_USER: uttecam_user
      MYSQL_PASSWORD: uttecam_pass
    ports:
      - "3306:3306"
    volumes:
      - uttecam_db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "uttecam_user", "-puttecam_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  uttecam_db_data:
