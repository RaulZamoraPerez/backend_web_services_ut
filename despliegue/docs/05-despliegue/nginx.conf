# Configuración Nginx para UTTECAM API - Producción
# Archivo: /etc/nginx/sites-available/uttecam-api

# Upstream: Pool de conexiones al backend Node.js
upstream uttecam_api {
    server 127.0.0.1:3002;
    keepalive 64;
}

# ════════════════════════════════════════════════════════════════
# HTTP SERVER - Redirect a HTTPS
# ════════════════════════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name api.uttecam.edu.mx;

    # Logging
    access_log /var/log/nginx/uttecam-api-http-access.log;
    error_log /var/log/nginx/uttecam-api-http-error.log;

    # Permitir desafíos Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirigir todo el tráfico HTTP a HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ════════════════════════════════════════════════════════════════
# HTTPS SERVER - Configuración principal
# ════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.uttecam.edu.mx;

    # ════════════════════════════════════════════════════════════
    # SSL/TLS Configuration
    # ════════════════════════════════════════════════════════════
    
    # Certificados SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.uttecam.edu.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.uttecam.edu.mx/privkey.pem;
    
    # Configuración SSL moderna y segura
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    
    # SSL Session Cache
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/api.uttecam.edu.mx/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ════════════════════════════════════════════════════════════
    # Security Headers
    # ════════════════════════════════════════════════════════════
    
    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Prevenir clickjacking
    add_header X-Frame-Options "DENY" always;
    
    # Prevenir MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # XSS Protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions Policy
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ════════════════════════════════════════════════════════════
    # Logging
    # ════════════════════════════════════════════════════════════
    
    access_log /var/log/nginx/uttecam-api-access.log;
    error_log /var/log/nginx/uttecam-api-error.log warn;

    # ════════════════════════════════════════════════════════════
    # Client Settings
    # ════════════════════════════════════════════════════════════
    
    # Tamaños de upload (importante para imágenes y PDFs)
    client_max_body_size 200M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    
    # Timeouts
    client_body_timeout 300s;
    client_header_timeout 60s;
    send_timeout 300s;

    # ════════════════════════════════════════════════════════════
    # Gzip Compression
    # ════════════════════════════════════════════════════════════
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # ════════════════════════════════════════════════════════════
    # API Proxy (todas las rutas excepto estáticos)
    # ════════════════════════════════════════════════════════════
    
    location / {
        # Proxy pass al backend Node.js
        proxy_pass http://uttecam_api;
        proxy_http_version 1.1;
        
        # Headers de proxy
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Cache bypass
        proxy_cache_bypass $http_upgrade;
        
        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Timeouts
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Límites
        proxy_max_temp_file_size 0;
    }

    # ════════════════════════════════════════════════════════════
    # Archivos estáticos - Uploads
    # ════════════════════════════════════════════════════════════
    
    location /uploads {
        alias /var/www/uttecam-api/uploads;
        
        # Seguridad: solo servir archivos permitidos
        location ~ \.(jpg|jpeg|png|gif|webp|pdf|doc|docx|xls|xlsx)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            
            # CORS para uploads
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
        }
        
        # Denegar acceso a archivos potencialmente peligrosos
        location ~ \.(php|sh|exe|bat|cmd)$ {
            deny all;
        }
        
        # Denegar acceso a archivos ocultos
        location ~ /\. {
            deny all;
        }
    }

    # ════════════════════════════════════════════════════════════
    # Archivos estáticos - Public
    # ════════════════════════════════════════════════════════════
    
    location /public {
        alias /var/www/uttecam-api/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # ════════════════════════════════════════════════════════════
    # Health Check (sin logging para evitar spam)
    # ════════════════════════════════════════════════════════════
    
    location /health {
        proxy_pass http://uttecam_api/health;
        access_log off;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ════════════════════════════════════════════════════════════
    # Métricas (opcional - proteger en producción)
    # ════════════════════════════════════════════════════════════
    
    location /metrics {
        # Permitir solo desde IPs específicas (ajustar según necesidad)
        # allow 192.168.1.0/24;  # Red interna
        # deny all;
        
        proxy_pass http://uttecam_api/metrics;
        access_log off;
    }

    # ════════════════════════════════════════════════════════════
    # Bloquear acceso a archivos sensibles
    # ════════════════════════════════════════════════════════════
    
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        return 404;
    }
    
    location ~ \.(sql|backup|bak|log)$ {
        deny all;
        return 404;
    }

    # ════════════════════════════════════════════════════════════
    # Rate Limiting (opcional - ajustar según necesidad)
    # ════════════════════════════════════════════════════════════
    
    # Limitar requests a API
    # limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    # limit_req zone=api burst=20 nodelay;
    
    # Limitar conexiones
    # limit_conn_zone $binary_remote_addr zone=addr:10m;
    # limit_conn addr 10;
}

# ════════════════════════════════════════════════════════════════
